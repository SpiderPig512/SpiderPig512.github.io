<style>
  :root{
    --navy:#0b3a5c;
    --navy-deep:#082c47;
    --gold:#f2b73e;
    --gold-dark:#d99e1f;
    --ink:#1c1c1c;
    --ink-dim:#4a4a4a;
    --active:#d7e02a;
    --sans:"Noto Sans TC", sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#fff;
    color:var(--ink);
    font-family:var(--sans);
  }

  /* ---------- NAV ---------- */
  nav{
    background:var(--navy);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    padding:0 clamp(16px, 4vw, 40px);
  }
  nav a{
    color:#fff;
    text-decoration:none;
    font-weight:700;
    font-size:clamp(.82rem, 1.3vw, 1rem);
    padding:clamp(16px, 2.4vw, 22px) clamp(10px, 1.6vw, 20px);
    display:flex;
    align-items:center;
    gap:4px;
    white-space:nowrap;
  }
  nav a.active{ color:var(--active); }
  nav a:hover{ color:var(--gold); }
  nav a .caret{
    font-size:.65em;
    margin-left:2px;
    transform:translateY(1px);
  }

  /* ---------- TITLE ---------- */
  .page-title{
    text-align:center;
    font-size:clamp(1.6rem, 4vw, 2.6rem);
    font-weight:500;
    letter-spacing:.15em;
    margin:clamp(28px, 5vw, 46px) 0 clamp(18px, 3vw, 28px);
  }

  /* ---------- SQUIGGLE DIVIDER ---------- */
  .squiggle-wrap{
    width:100%;
    max-width:1900px;
    margin:0 auto clamp(30px, 6vw, 60px);
    padding:0 clamp(16px, 4vw, 40px);
  }
  .squiggle-wrap svg{
    width:100%;
    height:auto;
    display:block;
  }

  /* ---------- BUTTON GRID ---------- */
  .btn-field{
    position:relative;
    max-width:1900px;
    margin:0 auto;
    padding:0 clamp(16px, 4vw, 40px) clamp(20px, 4vw, 40px);
  }
  .btn-row{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:clamp(20px, 3vw, 40px);
  }
  .btn-row.offset{
    margin-top:clamp(24px, 4vw, 46px);
  }
  .jubilee-btn{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
    color:var(--navy-deep);
    font-weight:700;
    font-size:clamp(.85rem, 1.5vw, 1.05rem);
    text-decoration:none;
    text-align:center;
    padding:clamp(16px, 2.6vw, 22px) clamp(20px, 3vw, 34px);
    border-radius:8px;
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
    transition:transform .15s ease, box-shadow .15s ease;
    display:inline-block;
    white-space:nowrap;
  }
  .jubilee-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
  }

  .col-left, .col-center, .col-right{
    display:flex;
    flex-direction:column;
    gap:clamp(24px, 4vw, 46px);
  }
  .col-left{ align-items:flex-start; }
  .col-center{ align-items:center; }
  .col-right{ align-items:flex-end; }
  .col-left .jubilee-btn:nth-child(2){ align-self:center; margin-left:clamp(20px, 4vw, 60px); }
  .col-right .jubilee-btn:nth-child(2){ align-self:center; margin-right:clamp(20px, 4vw, 60px); }

  /* ---------- POST VIEWS ---------- */
  .post-views{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--gold-dark);
    font-size:.9rem;
    padding:0 clamp(16px, 4vw, 40px);
    margin-top:clamp(30px, 5vw, 50px);
  }
  .post-views svg{ width:16px; height:16px; }

  /* ---------- FOOTER ---------- */
  .site-footer{
    text-align:center;
    font-size:clamp(.82rem, 1.4vw, .98rem);
    color:var(--ink-dim);
    padding:clamp(20px, 3vw, 30px) 20px clamp(40px, 6vw, 60px);
  }
  .site-footer a{
    color:var(--ink-dim);
    text-decoration:none;
    margin:0 clamp(6px, 1.2vw, 14px);
  }
  .site-footer a:hover{ text-decoration:underline; }
  .site-footer .sub{ margin-top:2px; }

  @media (max-width:820px){
    .btn-row{ flex-direction:column; align-items:center; }
    .col-left, .col-center, .col-right{ align-items:center; width:100%; }
    .col-left .jubilee-btn:nth-child(2),
    .col-right .jubilee-btn:nth-child(2){ margin:0; }
    .btn-row.offset{ margin-top:clamp(14px,3vw,24px); }
  }
</style>
