<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流金歲月 ~ 校長老師序言 - Golden Yinnies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f7f4ec;
    --cream-deep:#f2ede1;
    --brown:#4a2a12;
    --brown-deep:#3a2010;
    --gold:#f2b73e;
    --gold-dark:#d99e1f;
    --active:#d7e02a;
    --ink:#242018;
    --ink-dim:#4a4a4a;
    --sans:"Noto Sans TC", sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#fff;
    color:var(--ink);
    font-family:var(--sans);
  }

  /* ---------- NAV ---------- */
  .site-nav{
    background:var(--brown);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    padding:0 clamp(16px, 4vw, 40px);
  }
  .site-nav a{
    color:#fff;
    text-decoration:none;
    font-weight:700;
    font-size:clamp(.8rem, 1.3vw, 1rem);
    padding:clamp(14px, 2.2vw, 20px) clamp(10px, 1.6vw, 20px);
    display:flex;
    align-items:center;
    gap:4px;
    white-space:nowrap;
  }
  .site-nav a.active{ color:var(--active); }
  .site-nav a:hover{ color:var(--gold); }
  .site-nav a .caret{
    font-size:.65em;
    margin-left:2px;
    transform:translateY(1px);
  }

  /* ---------- TOP SECTION ---------- */
  .top-section{
    background:var(--cream);
    padding:clamp(28px, 5vw, 46px) clamp(16px, 4vw, 40px) clamp(40px, 6vw, 60px);
  }
  .page-title{
    text-align:center;
    font-size:clamp(1.4rem, 3.6vw, 2.3rem);
    font-weight:500;
    letter-spacing:.1em;
    margin:0 0 clamp(20px, 3.5vw, 30px);
  }

  /* ---------- HATCH DIVIDER ---------- */
  .hatch-wrap{
    max-width:1500px;
    margin:0 auto clamp(28px, 5vw, 46px);
  }
  .hatch-wrap svg{
    width:100%;
    height:auto;
    display:block;
  }

  /* ---------- BUTTONS ---------- */
  .btn-row{
    max-width:1500px;
    margin:0 auto;
    display:flex;
    flex-wrap:wrap;
    gap:clamp(16px, 2.4vw, 28px);
  }
  .preface-btn{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
    color:var(--brown-deep);
    font-weight:700;
    font-size:clamp(.8rem, 1.3vw, .98rem);
    text-decoration:none;
    text-align:center;
    padding:clamp(14px, 2.2vw, 18px) clamp(18px, 2.6vw, 28px);
    border-radius:6px;
    box-shadow:0 6px 14px rgba(0,0,0,0.2);
    transition:transform .15s ease, box-shadow .15s ease;
    flex:1 1 260px;
  }
  .preface-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
  }

  /* ---------- POST VIEWS ---------- */
  .post-views{
    max-width:1500px;
    margin:clamp(18px, 3vw, 26px) auto 0;
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--gold-dark);
    font-size:.9rem;
  }
  .post-views svg{ width:16px; height:16px; }

  /* ---------- COMMENT SECTION ---------- */
  .comment-section{
    background:var(--cream-deep);
    padding:clamp(40px, 6vw, 60px) clamp(16px, 4vw, 40px);
  }
  .comment-inner{
    max-width:1500px;
    margin:0 auto;
    display:grid;
    grid-template-columns:1.6fr 1fr;
    gap:clamp(24px, 4vw, 40px);
  }
  .comment-heading{
    font-size:clamp(1.4rem, 2.6vw, 1.8rem);
    font-weight:500;
    margin:0 0 10px;
    grid-column:1 / -1;
  }
  .comment-note{
    font-size:clamp(.85rem, 1.5vw, .98rem);
    color:var(--ink-dim);
    margin:0 0 clamp(16px, 2.6vw, 22px);
    grid-column:1 / -1;
  }
  textarea{
    width:100%;
    min-height:220px;
    resize:vertical;
    border:1px solid #ddd8c9;
    background:#fdfcf8;
    padding:16px;
    font-family:var(--sans);
    font-size:.95rem;
    border-radius:4px;
  }
  .field-col{
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .field-col input[type="text"],
  .field-col input[type="email"]{
    width:100%;
    padding:14px 16px;
    border:1px solid #ddd8c9;
    background:#fdfcf8;
    font-family:var(--sans);
    font-size:.95rem;
    border-radius:4px;
  }
  .checkbox-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:.9rem;
    color:var(--ink-dim);
  }
  .checkbox-row input{ width:16px; height:16px; }
  .post-comment-btn{
    align-self:flex-start;
    background:var(--gold);
    color:var(--brown-deep);
    font-weight:700;
    font-size:.95rem;
    border:none;
    padding:14px 26px;
    border-radius:4px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .post-comment-btn:hover{ background:var(--gold-dark); }

  /* ---------- FOOTER ---------- */
  .site-footer{
    text-align:center;
    font-size:clamp(.82rem, 1.4vw, .98rem);
    color:var(--ink-dim);
    padding:clamp(30px, 5vw, 50px) 20px clamp(40px, 6vw, 60px);
    background:#fff;
  }
  .site-footer a{
    color:var(--ink-dim);
    text-decoration:none;
    margin:0 clamp(6px, 1.2vw, 14px);
  }
  .site-footer a:hover{ text-decoration:underline; }
  .site-footer .sub{ margin-top:4px; }

  @media (max-width:760px){
    .comment-inner{ grid-template-columns:1fr; }
    .preface-btn{ flex:1 1 100%; }
  }
</style>
</head>
<body>

  <nav class="site-nav">

    <a href="#">最新上載 <span class="caret">▾</span></a>
  </nav>

  <!-- TOP SECTION -->
  <div class="top-section">
    <h1 class="page-title">流金歲月 ~ 校長老師序言</h1>

    <!-- HATCH DIVIDER -->
    <div class="hatch-wrap">
      <svg viewBox="0 0 1500 24" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <defs>
          <pattern id="hatch" width="20" height="24" patternUnits="userSpaceOnUse" patternTransform="skewX(-20)">
            <rect width="12" height="24" fill="#1c1c1c"/>
          </pattern>
        </defs>
        <rect width="1500" height="24" fill="url(#hatch)"/>
      </svg>
    </div>

    <!-- BUTTONS -->
    <div class="btn-row">
      <a class="preface-btn" href="principal-message.html">校長老師序言 ~ 校長贈言</a>
      <a class="preface-btn" href="teacher-tributes.html">校長老師序言 ~ 良師贈言-留影</a>
      <a class="preface-btn" href="#">校長老師序言 ~ 社長 社代表 心聲</a>
    </div>

    <!-- POST VIEWS -->
    <div class="post-views">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="14" width="4" height="7" fill="currentColor"/>
        <rect x="10" y="9" width="4" height="12" fill="currentColor"/>
        <rect x="17" y="4" width="4" height="17" fill="currentColor"/>
      </svg>
      Post Views: 5
    </div>
  </div>

  <!-- COMMENT SECTION -->
  <div class="comment-section">
    <form class="comment-inner" onsubmit="return false;">
      <h2 class="comment-heading">Leave a Comment</h2>
      <p class="comment-note">Your email address will not be published. Required fields are marked *</p>

      <textarea placeholder="Type here.."></textarea>

      <div class="field-col">
        <input type="text" placeholder="Name*" required>
        <input type="email" placeholder="Email*" required>
        <label class="checkbox-row"><input type="checkbox"> Notify me of follow-up comments by email.</label>
        <label class="checkbox-row"><input type="checkbox"> Notify me of new posts by email.</label>
        <button class="post-comment-btn" type="submit">Post Comment »</button>
      </div>
    </form>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="links">
      <a href="index.html">主頁</a>
      <a href="jubilee.html">50 金禧</a>
      <a href="#">55 翡翠禧</a>
      <a href="#">母校培正</a>

  </footer>

</body>
